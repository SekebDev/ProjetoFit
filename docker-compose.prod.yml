# Ambiente de PRODUÇÃO (local): imagens otimizadas + Postgres.
# Uso: JWT_SECRET="..." docker compose -f docker-compose.prod.yml up --build
name: workout-prod

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workout}
      POSTGRES_DB: workout
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://workout:${POSTGRES_PASSWORD:-workout}@db:5432/workout?schema=public
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no ambiente}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: "3001"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata_prod:
